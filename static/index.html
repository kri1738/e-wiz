<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-WIZ — Ancient Intelligence</title>
  <meta name="description" content="E-WIZ: An ancient intelligence interface for knowledge, code, and wisdom.">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <div class="toolbar">
    <div class="logo">E-WIZ</div>
    <div class="toolbar-center">NEURAL INTERFACE v3.0</div>
    <div class="status">
      <div class="status-dot"></div>
      ONLINE
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-top">
        <button class="new-thread-btn" id="new-thread-btn" onclick="newThread()">+ New Thread</button>
      </div>
      <div class="sidebar-label">Threads</div>
      <div class="conv-list" id="conv-list"></div>
    </div>

    <div class="chat-area">
      <div id="messages">
        <div class="empty-state" id="empty">
          <div class="empty-glow"></div>
          <div class="empty-logo">E-WIZ</div>
          <div class="empty-sub">Ancient Intelligence • Awaiting Input</div>
          <div class="empty-divider"></div>
          <div class="suggestion-chips">
            <button class="chip" onclick="useSuggestion('Explain quantum entanglement simply')">Explain quantum entanglement</button>
            <button class="chip" onclick="useSuggestion('Write a Python sorting algorithm')">Write a sorting algorithm</button>
            <button class="chip" onclick="useSuggestion('What is the nature of consciousness?')">The nature of consciousness</button>
            <button class="chip" onclick="useSuggestion('Help me debug my code')">Help me debug code</button>
          </div>
        </div>
      </div>
      <div class="input-area">
        <div class="input-container">
          <div class="input-prefix">&gt;_</div>
          <textarea id="input" placeholder="Ask E-Wiz anything..." rows="1" autocomplete="off"></textarea>
          <button id="send" aria-label="Send message">
            <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentConvId = null;

    // Configure marked
    marked.setOptions({
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      }
    });

    // Time formatter
    function getTimeStr() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Auto-grow textarea
    const inputEl = document.getElementById("input");
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + "px";
    });

    // Empty state HTML template
    function emptyStateHTML() {
      return `
        <div class="empty-state" id="empty">
          <div class="empty-glow"></div>
          <div class="empty-logo">E-WIZ</div>
          <div class="empty-sub">Ancient Intelligence • Awaiting Input</div>
          <div class="empty-divider"></div>
          <div class="suggestion-chips">
            <button class="chip" onclick="useSuggestion('Explain quantum entanglement simply')">Explain quantum entanglement</button>
            <button class="chip" onclick="useSuggestion('Write a Python sorting algorithm')">Write a sorting algorithm</button>
            <button class="chip" onclick="useSuggestion('What is the nature of consciousness?')">The nature of consciousness</button>
            <button class="chip" onclick="useSuggestion('Help me debug my code')">Help me debug code</button>
          </div>
        </div>`;
    }

    // Suggestion chip click
    function useSuggestion(text) {
      inputEl.value = text;
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + "px";
      inputEl.focus();
      sendMessage();
    }

    // Render math in an element
    function renderMath(el) {
      renderMathInElement(el, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "$", right: "$", display: false }
        ]
      });
    }

    // Build user message HTML
    function userMsgHTML(text) {
      return `
        <div class="message-row user">
          <div class="message-header">
            <div class="avatar user-avatar">Y</div>
            <div class="message-sender">You</div>
            <div class="message-time">${getTimeStr()}</div>
          </div>
          <div class="message-content">${escapeHtml(text)}</div>
        </div>`;
    }

    // Build bot message HTML
    function botMsgHTML(id) {
      return `
        <div class="message-row bot" id="${id}">
          <div class="message-header">
            <div class="avatar bot-avatar">E</div>
            <div class="message-sender">E-Wiz</div>
            <div class="message-time">${getTimeStr()}</div>
            <button class="copy-btn" onclick="copyBotMsg('${id}')">COPY</button>
          </div>
          <div class="message-content" id="content-${id}"></div>
        </div>`;
    }

    // Build bot message for history (already has content)
    function botMsgHistoryHTML(content) {
      return `
        <div class="message-row bot">
          <div class="message-header">
            <div class="avatar bot-avatar">E</div>
            <div class="message-sender">E-Wiz</div>
          </div>
          <div class="message-content">${marked.parse(content)}</div>
        </div>`;
    }

    // Escape HTML for user messages
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Copy bot message
    function copyBotMsg(id) {
      const text = window._botText?.[id] || '';
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector(`#${id} .copy-btn`);
        if (btn) {
          btn.textContent = 'COPIED';
          setTimeout(() => { btn.textContent = 'COPY'; }, 1500);
        }
      });
    }

    // Thinking indicator
    function thinkingHTML(id) {
      return `
        <div class="thinking" id="${id}">
          <div class="thinking-dots">
            <span></span><span></span><span></span>
          </div>
          <div class="thinking-text">E-Wiz is thinking...</div>
        </div>`;
    }

    // ========== CONVERSATION MANAGEMENT ==========

    async function loadConvList() {
      const res = await fetch("/conversations");
      const convs = await res.json();
      const list = document.getElementById("conv-list");
      list.innerHTML = "";

      if (convs.length === 0) {
        list.innerHTML = `<div class="no-threads">No threads yet</div>`;
        return;
      }

      convs.forEach(conv => {
        const item = document.createElement("div");
        item.className = "conv-item" + (conv.id === currentConvId ? " active" : "");
        item.innerHTML = `
          <div class="conv-title">${escapeHtml(conv.title)}</div>
          <button class="conv-delete" onclick="deleteConv('${conv.id}', event)">✕</button>
        `;
        item.addEventListener("click", () => switchConv(conv.id));
        list.appendChild(item);
      });
    }

    async function switchConv(convId) {
      currentConvId = convId;
      const res = await fetch(`/conversations/${convId}`);
      const conv = await res.json();
      const messages = document.getElementById("messages");
      messages.innerHTML = "";

      if (conv.messages.length === 0) {
        messages.innerHTML = emptyStateHTML();
      } else {
        conv.messages.forEach(msg => {
          if (msg.role === "user") {
            messages.innerHTML += `
              <div class="message-row user">
                <div class="message-header">
                  <div class="avatar user-avatar">Y</div>
                  <div class="message-sender">You</div>
                </div>
                <div class="message-content">${escapeHtml(msg.content)}</div>
              </div>`;
          } else {
            messages.innerHTML += botMsgHistoryHTML(msg.content);
          }
        });

        // Highlight code and render math
        messages.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        messages.querySelectorAll('.message-content').forEach(el => renderMath(el));
        messages.scrollTop = messages.scrollHeight;
      }

      await loadConvList();
    }

    async function newThread() {
      const res = await fetch("/conversations", { method: "POST" });
      const conv = await res.json();
      currentConvId = conv.id;
      await loadConvList();
      switchConv(conv.id);
    }

    async function deleteConv(convId, e) {
      e.stopPropagation();
      await fetch(`/conversations/${convId}`, { method: "DELETE" });
      if (currentConvId === convId) {
        currentConvId = null;
        document.getElementById("messages").innerHTML = emptyStateHTML();
      }
      loadConvList();
    }

    // ========== SEND MESSAGE ==========

    async function sendMessage() {
      const messages = document.getElementById("messages");
      const sendBtn = document.getElementById("send");
      const userText = inputEl.value.trim();
      if (!userText) return;

      // Auto create thread if none selected
      if (!currentConvId) {
        const res = await fetch("/conversations", { method: "POST" });
        const conv = await res.json();
        currentConvId = conv.id;
        await loadConvList();
      }

      // Remove empty state
      const empty = document.getElementById("empty");
      if (empty) empty.remove();

      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;

      // Add user message
      messages.innerHTML += userMsgHTML(userText);

      // Add thinking indicator
      const thinkingId = "thinking-" + Date.now();
      messages.innerHTML += thinkingHTML(thinkingId);
      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userText, conv_id: currentConvId })
        });

        document.getElementById(thinkingId)?.remove();

        const botRowId = "bot-" + Date.now();
        messages.innerHTML += botMsgHTML(botRowId);

        const contentEl = document.getElementById(`content-${botRowId}`);
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullText = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          fullText += decoder.decode(value);
          contentEl.innerHTML = marked.parse(fullText);
          contentEl.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
          renderMath(contentEl);
          messages.scrollTop = messages.scrollHeight;
        }

        if (!window._botText) window._botText = {};
        window._botText[botRowId] = fullText;

        // Refresh sidebar title
        loadConvList();

      } catch (err) {
        document.getElementById(thinkingId)?.remove();
        messages.innerHTML += `<div class="error-msg">[ERROR] Failed to reach E-WIZ. Try again.</div>`;
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    // ========== EVENT LISTENERS ==========

    document.getElementById("send").addEventListener("click", sendMessage);

    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Init
    loadConvList();
  </script>
</body>
</html>
